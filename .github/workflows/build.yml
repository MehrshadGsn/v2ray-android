name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev autoconf libtool pkg-config \
          zlib1g-dev cmake
        pip install buildozer cython

    - name: Accept Android licenses
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33" || true

    - name: Build APK
      run: |
        export ANDROIDAPI=33
        export ANDROIDMINAPI=21
        yes | buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: v2ray-apk
        path: bin/*.apk
